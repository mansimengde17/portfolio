name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/portfolio-redesign-content-npy5vs
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch media assets
        continue-on-error: true
        run: |
          mkdir -p client/public/assets
          base="https://mansifolio-cdgtwtjs.manus.space/manus-storage"
          for f in \
            aws-reinvent-group_3a85b289.jpeg \
            aws-sap-badge_926e6c51.png \
            logo-csulb-official_58b580b1.png \
            aws-saa-badge-user_eb425035.png \
            aws-reinvent-grant_1efb973f.webp \
            graduation-hero_d7b38a9a.webp \
            datathon-win_8d0c11a5.webp \
            logo-atkins-official_2a2e6283.png \
            code-fiesta-award_e29a5068.webp \
            logo-mckinsey-official_9ac08f6c.png \
            logo-algosec-official_35c93e9f.png; do
            [ -f "client/public/assets/$f" ] || curl -fsSL --retry 3 -o "client/public/assets/$f" "$base/$f" || echo "failed: $f"
          done

      - name: Build
        run: pnpm exec vite build

      - name: SPA 404 fallback
        run: cp dist/public/index.html dist/public/404.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
